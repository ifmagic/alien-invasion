<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alien Invasion - Space Shooter</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=alien%20invasion%20game%20icon%20simple%20space%20ship%20red%20alien%20blue%20background&image_size=square">
</head>

<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader">
            <div class="loader-spinner"></div>
            <h2>ALIEN INVASION</h2>
            <p class="loading-text">Loading PyScript Engine...</p>
            <p class="loading-hint">First launch may take a few seconds</p>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </div>
    
    <div class="stars-bg"></div>
    
    <div class="container">
        <h1>ALIEN INVASION</h1>
        <p class="subtitle">Space Shooter Game</p>
        
        <div class="instructions">
            <div class="instruction-item">
                <span class="key">SPACE</span>
                <span>Start / Fire</span>
            </div>
            <div class="instruction-item">
                <span class="key">← →</span>
                <span>Move Ship</span>
            </div>
            <div class="instruction-item">
                <span class="key">P</span>
                <span>Pause Game</span>
            </div>
        </div>
        
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            <div class="canvas-border"></div>
        </div>
        
        <div class="controls-hint">
            <div class="hint-item">
                <span class="hint-icon">👾</span>
                <span>Destroy all aliens</span>
            </div>
            <div class="hint-item">
                <span class="hint-icon">💖</span>
                <span>3 Lives</span>
            </div>
            <div class="hint-item">
                <span class="hint-icon">⚡</span>
                <span>Speed increases each level</span>
            </div>
            <div class="hint-item">
                <span class="hint-icon">🏆</span>
                <span>High score saved</span>
            </div>
        </div>
    </div>
    
    <script type="py" src="./main.py" config='{"packages": []}'></script>
</body>

</html>
